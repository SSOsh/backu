<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>몰래 날려버려 🖕</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- 콤보 카운터 (상단 중앙) -->
    <div id="comboCounter" class="combo-counter">
        <span id="comboCount">0</span>
        <span class="combo-label">COMBO</span>
    </div>

    <!-- 설정 UI (우측 하단) -->
    <div class="controls" id="controls">
        <div class="controls-header">
            <span>Settings</span>
            <button id="minimizeBtn" class="minimize-btn">−</button>
        </div>
        
        <div class="controls-content" id="controlsContent">
            <div class="control-group">
                <div class="group-header" data-target="emojiGroup">
                    <label>Emoji</label>
                    <span class="chevron">▼</span>
                </div>
                <div id="emojiGroup" class="button-group collapsible-content">
                    <button class="emoji-btn active" data-emoji="🖕">🖕</button>
                    <button class="emoji-btn" data-emoji="💩">💩</button>
                    <button class="emoji-btn" data-emoji="🤬">🤬</button>
                    <button class="emoji-btn" data-emoji="👊">👊</button>
                    <button class="emoji-btn" data-emoji="💀">💀</button>
                    <button class="emoji-btn" data-emoji="🔥">🔥</button>
                </div>
            </div>

            <div class="control-group">
                <div class="group-header" data-target="fadeGroup">
                    <label>Fade-out</label>
                    <span class="chevron">▼</span>
                </div>
                <div id="fadeGroup" class="button-group collapsible-content">
                    <button class="fade-btn" data-time="0.3">0.3s</button>
                    <button class="fade-btn active" data-time="0.5">0.5s</button>
                    <button class="fade-btn" data-time="1.0">1.0s</button>
                </div>
            </div>

            <div class="control-group">
                <div class="group-header" data-target="effectGroup">
                    <label>Effect</label>
                    <span class="chevron">▼</span>
                </div>
                <div id="effectGroup" class="button-group collapsible-content">
                    <button class="effect-btn active" data-effect="firework">🎆</button>
                    <button class="effect-btn" data-effect="emoji">🖕</button>
                </div>
            </div>

            <div class="control-group">
                <div class="group-header">
                    <label>Options</label>
                </div>
                <div class="toggle-group">
                    <div class="toggle-item">
                        <span>Combo</span>
                        <label class="switch">
                            <input type="checkbox" id="comboToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="toggle-item">
                        <span>화면 흔들기</span>
                        <label class="switch">
                            <input type="checkbox" id="shakeToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button id="clearBtn" class="action-btn">Clear</button>
            <button id="escapeBtn" class="action-btn escape-btn">탈출 (Q)</button>
        </div>
    </div>

    <!-- 404 화면 -->
    <div id="error404" class="error-screen">
        <h1>404</h1>
        <p>Page Not Found</p>
        <p class="error-detail">The requested URL was not found on this server.</p>
    </div>

    <!-- About 버튼 (좌측 하단) -->
    <button id="aboutBtn" class="about-btn">About</button>

    <!-- 공유 버튼 (좌측 하단, About 위) -->
    <button id="shareBtn" class="share-btn">공유</button>

    <!-- About 모달 -->
    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <h2>몰래 날려버려 🖕</h2>
            <h3>문의</h3>
            <p class="email">tngh147258@naver.com</p>
            <hr>
            <h3>커피 사주실 분 ☕</h3>
            <div class="donation">
                <p>카카오뱅크: 3333-26-7184989</p>
                <button id="copyBtn" class="copy-btn">복사</button>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
